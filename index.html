<!DOCTYPE html>
<html lang="ko" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>내 원신 맵</title>
<link rel="stylesheet" href="lib/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="topbar">
  <button id="menuToggle" aria-label="필터 열기" title="필터">☰</button>
  <h1>내 원신 맵</h1>
  <select id="mapSelect" aria-label="지도 선택"></select>
  <div id="stats" title="수집 진행도"></div>
  <span id="syncStatus" class="sync-status"></span>

  <div class="topbar-right">
    <button id="themeToggle" aria-label="테마 전환" title="라이트/다크 전환">◐</button>

    <div id="authArea">
      <button id="loginBtn">로그인</button>
      <div id="loginForm" class="hidden">
        <input id="loginEmail" type="email" placeholder="이메일 주소" autocomplete="email">
        <button id="loginSend" class="btn-primary">로그인 링크 받기</button>
        <p class="tip">비밀번호 없이, 메일로 온 링크를 클릭하면 로그인돼요.</p>
      </div>
      <div id="userBox" class="hidden">
        <span id="userEmail"></span>
        <button id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <button id="adminToggle" aria-pressed="false">관리자 모드</button>
    <button id="exportBtn" class="hidden" title="현재 지도의 마커를 파일로 저장">마커 내보내기</button>
    <button id="clearCustomBtn" class="hidden" title="관리자 모드에서 추가한 마커를 모두 삭제">커스텀 초기화</button>
  </div>
</header>

<aside id="sidebar">
  <label id="hideCompletedRow" title="원신맵스처럼 먹은 마커를 지도에서 숨깁니다">
    <input id="hideCompleted" type="checkbox"> 먹은 것 숨기기
  </label>
  <div class="sidebar-actions">
    <button id="showAllBtn">전체 켜기</button>
    <button id="hideAllBtn">전체 끄기</button>
  </div>
  <h2>카테고리 <span class="hint">그룹 클릭 → 펼치기</span></h2>
  <div id="filters"></div>
  <p class="tip">마커를 클릭 → <b>먹었음</b>을 누르면 지도에서 사라져요.<br>로그인하면 기기 간 동기화, 아니면 이 브라우저에 저장됩니다.</p>
</aside>

<main id="map">
  <div id="zoomHint" class="hidden">🔍 확대하면 마커가 표시됩니다</div>
</main>

<section id="adminPanel" class="hidden">
  <h3 id="adminTitle">마커 추가</h3>
  <div class="field">
    <label for="adminCategory">종류</label>
    <select id="adminCategory"></select>
  </div>
  <div class="field">
    <label for="adminName">이름 (비우면 자동)</label>
    <input id="adminName" type="text" placeholder="예: 바람신의 눈동자 #1">
  </div>
  <div class="field">
    <label for="adminDesc">설명</label>
    <input id="adminDesc" type="text" placeholder="예: 나무 위에 떠 있음">
  </div>
  <p id="adminAddHint" class="tip">지도를 클릭하면 마커가 추가됩니다.<br>커스텀 마커는 드래그로 옮기고, 팝업에서 편집할 수 있어요.</p>
  <div id="adminEditActions" class="hidden">
    <button id="adminSaveEdit" class="btn-primary">저장</button>
    <button id="adminCancelEdit">취소</button>
  </div>
</section>

<div id="sidebarScrim"></div>

<script src="lib/leaflet.js"></script>
<script src="lib/supabase.js"></script>
<script src="data/config.js"></script>
<script src="data/maps.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
