    <path d="M0 200 Q 250 180 500 200 T 1000 200 T 1500 200 T 2000 200"/>
    <path d="M0 1300 Q 250 1280 500 1300 T 1000 1300 T 1500 1300 T 2000 1300"/>
  </g>
  <!-- 대륙 -->
  <path d="M 350 350 Q 550 200 850 280 Q 1150 200 1400 320 Q 1700 380 1650 650
