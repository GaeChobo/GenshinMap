  <text x="1000" y="120" font-family="sans-serif" font-size="52" fill="#e8eaf0" text-anchor="middle" opacity="0.85">티바트 대륙 (임시 이미지)</text>
  <text x="1000" y="175" font-family="sans-serif" font-size="26" fill="#9aa3b8" text-anchor="middle">실제 맵 이미지로 교체 예정</text>
</svg>
