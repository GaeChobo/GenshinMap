name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 데이터 파일 문법 검증
        run: |
          node --check data/maps.js
          for f in data/markers/*.js; do node --check "$f"; done
          node --check js/app.js

      - name: 캐시버스팅 (에셋 버전 = 커밋 SHA)
        run: |
          VER="${GITHUB_SHA::8}"
          sed -i "s/__ASSET_V__/${VER}/g" index.html
          echo "asset version = ${VER}"
          grep -o 'v=[0-9a-f]\{8\}' index.html | head -1

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 사이트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 배포
        id: deployment
        uses: actions/deploy-pages@v4
